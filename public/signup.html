<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Purple Point - Signup</title>
  </head>
  <body>
    <h1>SIGNUP PAGE</h1>

    <form action="" method="post">
      <input
        type="text"
        name="firstName"
        placeholder="Ex. Small"
        required
      /><br />
      <input
        type="text"
        name="lastName"
        placeholder="Ex. Orca"
        required
      /><br />
      <input
        type="text"
        name="username"
        placeholder="Ex. smallorca"
        required
      /><br />
      <input
        type="email"
        name="email"
        placeholder="s.orca@ocean.com"
        required
      /><br />
      <input
        type="password"
        name="password"
        placeholder="Create a strong password"
        required
      /><br />
      <input
        type="tel"
        name="contactNumber"
        placeholder="+63 9XX XXX XXXX"
        required
      /><br />

      <button type="button" id="signUpSubmit">Sign Up</button>
    </form>

    <script src="public_js/signup.js"></script>
  </body>
</html>
