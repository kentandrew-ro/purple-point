<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add Patient</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button type="button" onclick="history.back()">← Back</button>
    <form id="add-patient-form">
      <input name="first_name" placeholder="First name" required />
      <input name="last_name" placeholder="Last name" required />
      <input
        name="date_of_birth"
        type="date"
        placeholder="Date of Birth"
        required
      />
      <select name="gender" required>
        <option value="" disabled selected hidden>Select Gender</option>
        <option value="Male">Male</option>
        <option value="Female">Female</option>
      </select>
      <input name="contact_number" placeholder="Contact Number" />
      <input name="house_no" placeholder="House Number" required />
      <input name="street" placeholder="Street" required />
      <input name="barangay" placeholder="Barangay" required />
      <input name="city" placeholder="City" required />
      <input name="zip_code" placeholder="Zip Code" required />
      <select name="blood_type" required>
        <option value="" disabled selected hidden>Select Blood Type</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
      </select>
      <button type="submit">Save Patient</button>
    </form>

    <div id="add-patient-result" style="margin-top: 16px"></div>

    <script src="/js/profile.js"></script>
  </body>
</html>
