<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Appointments</title>
    <style>
      .view {
        display: none;
      }
      .view.active {
        display: block;
      }
      #patient-id-field {
        display: none;
      }
      #appointment-status-field {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="view-choose" class="view active">
      <button type="button" onclick="history.back()">← Back</button>
      <h2>Appointments</h2>
      <button type="button" id="btn-add">Add Appointment</button>
      <button type="button" id="btn-view">View Appointments</button>
      <button type="button" id="btn-cancel">Cancel Appointment</button>
    </div>

    <div id="view-add" class="view">
      <button id="back-from-add" type="button">← Back</button>
      <h2>Add Appointment</h2>
      <form id="add-appointment-form">
        <div id="patient-id-field">
          <input
            name="patient_id"
            type="number"
            placeholder="Patient ID"
          /><br />
        </div>
        <input name="appointment_date" type="datetime-local" required /><br />
        <select name="appointment_type" required>
          <option value="">Select Appointment Type</option>
          <option value="consultation">Consultation</option>
          <option value="cleaning">Cleaning</option>
          <option value="filling">Filling</option>
          <option value="extraction">Extraction</option>
          <option value="other">Other</option></select
        ><br />
        <select name="dentist_id">
          <option value="">Select Doctor</option></select
        ><br />
        <div id="appointment-status-field">
          <select name="appointment_status">
            <option value="scheduled" selected>Scheduled</option>
            <option value="completed">Completed</option>
            <option value="cancelled">Cancelled</option></select
          ><br />
        </div>
        <textarea
          name="reason_for_visit"
          placeholder="Reason for Visit"
        ></textarea
        ><br />
        <button type="submit">Save Appointment</button>
      </form>
      <div id="add-appointment-result" style="margin-top: 16px"></div>
    </div>

    <div id="view-view" class="view">
      <button id="back-from-view" type="button">← Back</button>
      <h2>Appointments</h2>
      <div id="view-appointment-result" style="margin-top: 16px"></div>
    </div>

    <div id="view-cancel" class="view">
      <button id="back-from-cancel" type="button">← Back</button>
      <h2>Cancel Appointment</h2>
      <div id="cancel-appointment-list" style="margin-top: 16px"></div>
      <div id="cancel-appointment-result" style="margin-top: 16px"></div>

      <div
        id="cancel-reason-modal"
        style="
          display: none;
          position: fixed;
          inset: 0;
          background: rgba(0, 0, 0, 0.45);
          align-items: center;
          justify-content: center;
          z-index: 1000;
        "
      >
        <div
          style="
            background: #fff;
            width: min(92vw, 420px);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.2);
          "
        >
          <h3 style="margin-top: 0">Cancel Appointment</h3>
          <p id="cancel-modal-title" style="margin-bottom: 12px"></p>
          <label for="cancel-reason-input">Reason for cancellation</label><br />
          <textarea
            id="cancel-reason-input"
            style="
              width: 100%;
              min-height: 90px;
              margin-top: 8px;
              box-sizing: border-box;
            "
            placeholder="Enter reason for cancellation"
            required
          ></textarea>
          <div style="display: flex; gap: 8px; margin-top: 16px">
            <button type="button" id="confirm-cancel-btn">Confirm</button>
            <button type="button" id="close-cancel-modal-btn">Close</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/js/appointments.js"></script>
  </body>
</html>
